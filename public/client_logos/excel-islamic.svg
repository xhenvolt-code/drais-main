<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" className="w-full h-full">
  <defs>
    <linearGradient id="excelBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="80" fill="white"/>
  
  <!-- Logo background -->
  <rect x="10" y="15" width="50" height="50" fill="url(#excelBg)" rx="12"/>
  
  <!-- Excel "E" symbol -->
  <g transform="translate(20, 25)">
    <rect x="8" y="5" width="20" height="4" fill="white"/>
    <rect x="8" y="15" width="15" height="4" fill="white"/>
    <rect x="8" y="25" width="20" height="4" fill="white"/>
    <rect x="8" y="5" width="4" height="24" fill="white"/>
  </g>
  
  <!-- School name -->
  <text x="70" y="22" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#dc2626">EXCEL</text>
  <text x="70" y="37" font-family="Arial, sans-serif" font-size="10" fill="#b91c1c">Islamic Nursery &amp;</text>
  <text x="70" y="50" font-family="Arial, sans-serif" font-size="10" fill="#b91c1c">Primary School</text>
  <text x="70" y="65" font-family="Arial, sans-serif" font-size="7" fill="#6b7280">Building Tomorrow's Leaders</text>
</svg>