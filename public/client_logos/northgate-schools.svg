<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" className="w-full h-full">
  <defs>
    <linearGradient id="ngBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3730a3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="80" fill="white"/>
  
  <!-- Logo background -->
  <rect x="10" y="15" width="50" height="50" fill="url(#ngBg)" rx="8"/>
  
  <!-- Gate symbol -->
  <g transform="translate(20, 25)">
    <rect x="5" y="15" width="3" height="20" fill="white"/>
    <rect x="12" y="10" width="3" height="25" fill="white"/>
    <rect x="19" y="15" width="3" height="20" fill="white"/>
    <rect x="26" y="10" width="3" height="25" fill="white"/>
    <rect x="5" y="8" width="27" height="3" fill="white"/>
    <rect x="5" y="32" width="27" height="3" fill="white"/>
  </g>
  
  <!-- School name -->
  <text x="70" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e40af">NORTHGATE</text>
  <text x="70" y="45" font-family="Arial, sans-serif" font-size="12" fill="#3730a3">SCHOOLS</text>
  <text x="70" y="60" font-family="Arial, sans-serif" font-size="8" fill="#6b7280">Excellence in Education</text>
</svg>